<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICC Event Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cambria&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1c355e;--navy-l:#2a4a7f;--green:#60a511;--green-l:#e8f5d0;--amber:#e8b146;--amber-l:#fdf3dc;--blue:#0083c2;--blue-l:#e0f2fb;--red:#e53d51;--red-l:#fde8eb;--gray:#76777b;--gray-l:#f0f0f1;--gray-ll:#f8f8f8;--border:rgba(28,53,94,0.1);--r:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Open Sans',sans-serif;background:var(--gray-ll);color:#1a1a2e;font-size:14px;}
.hdr{background:var(--navy);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;}
.hdr-org{font-family:'Cambria',serif;font-size:15px;color:white;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:.1em;text-transform:uppercase;}
.hdr-nav{display:flex;gap:4px;}
.nb{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.65);font-family:'Open Sans',sans-serif;}
.nb:hover{background:rgba(255,255,255,0.1);color:white;}
.nb.active{background:white;border-color:white;color:var(--navy);font-weight:600;}
.app{display:flex;height:100vh;padding-top:56px;}
.sb{width:220px;min-width:220px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sb-sec{padding:14px 16px 4px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);}
.sb-i{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:13px;cursor:pointer;transition:all .12s;color:#444;border-left:3px solid transparent;margin-right:6px;border-radius:0 5px 5px 0;}
.sb-i:hover{background:var(--gray-ll);color:var(--navy);}
.sb-i.active{background:#e8edf5;color:var(--navy);border-left-color:var(--navy);font-weight:600;}
.sb-i.action{color:var(--navy);font-weight:600;}
.sb-i.action:hover{background:var(--navy);color:white;}
.sb-ic{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.sb-badge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:18px;text-align:center;}
.sb-badge.red{background:var(--red-l);color:var(--red);}
.sb-div{height:1px;background:var(--border);margin:8px 16px;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.content{flex:1;overflow-y:auto;padding:22px 24px;}
.btn{padding:7px 16px;border-radius:var(--r);font-size:13px;font-family:'Open Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:white;color:var(--navy);}
.btn:hover{background:var(--gray-ll);}
.btn.primary{background:var(--navy);color:white;border-color:var(--navy);}
.btn.primary:hover{background:var(--navy-l);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;}
.card-title{font-family:'Cambria',serif;font-size:15px;color:var(--navy);margin-bottom:12px;}
.ph{font-family:'Cambria',serif;font-size:22px;color:var(--navy);margin-bottom:4px;}
.ps{font-size:12px;color:var(--gray);margin-bottom:20px;}
.content-bar{background:white;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;margin:-22px -24px 22px -24px;}
.content-title{font-family:'Cambria',serif;font-size:20px;color:var(--navy);}
.content-actions{display:flex;gap:8px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.sc{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;border-top:3px solid var(--navy);}
.sc.red{border-top-color:var(--red);}
.sc.green{border-top-color:var(--green);}
.sc.amber{border-top-color:var(--amber);}
.sc.blue{border-top-color:var(--blue);}
.sc.muted{border-top-color:var(--gray-l);}
.sl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:6px;}
.sv{font-family:'Cambria',serif;font-size:30px;color:var(--navy);line-height:1;margin-bottom:3px;}
.sc.red .sv{color:var(--red);}
.sc.green .sv{color:var(--green);}
.sc.amber .sv{color:#a67a1a;}
.sc.blue .sv{color:var(--blue);}
.sc.muted .sv{color:var(--gray);}
.ss{font-size:11px;color:var(--gray);}
.next-ban{background:var(--navy);border-radius:var(--r);padding:18px 20px;color:white;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.nl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:3px;}
.nn{font-family:'Cambria',serif;font-size:19px;margin-bottom:5px;}
.nm{font-size:12px;color:rgba(255,255,255,.55);display:flex;gap:14px;}
.cdn{text-align:right;flex-shrink:0;}
.cdn-n{font-family:'Cambria',serif;font-size:40px;line-height:1;}
.cdn-l{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dp{background:white;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.dp-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dp-title{font-family:'Cambria',serif;font-size:13px;color:var(--navy);font-weight:600;}
.dp-link{font-size:11px;color:var(--blue);cursor:pointer;}
.dp-link:hover{text-decoration:underline;}
.dr{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);}
.dr:last-child{border-bottom:none;}
.dr:hover{background:var(--gray-ll);}
.dd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dn{font-size:13px;font-weight:600;color:var(--navy);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ddt{font-size:11px;color:var(--gray);white-space:nowrap;}
.dbadge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap;}
.qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.qa{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .15s;text-align:left;font-family:'Open Sans',sans-serif;}
.qa:hover{border-color:var(--navy);box-shadow:0 2px 12px rgba(28,53,94,0.08);}
.qa-ic{font-size:18px;margin-bottom:5px;}
.qa-t{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:2px;}
.qa-d{font-size:11px;color:var(--gray);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:7px 11px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);border-bottom:2px solid var(--border);}
.tbl td{padding:10px 11px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.tbl tr:hover td{background:var(--gray-ll);}
.sp{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;}
.sp-progress{background:var(--blue-l);color:var(--blue);}
.sp-set{background:#e8edf5;color:var(--navy);}
.sp-perspective{background:var(--gray-l);color:var(--gray);}
.sp-requested{background:var(--amber-l);color:#a67a1a;}
.sp-complete{background:var(--green-l);color:var(--green);}
.sync-row{display:flex;gap:4px;flex-wrap:wrap;}
.syn{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;white-space:nowrap;}
.syn.done{background:var(--green-l);color:var(--green);border-color:#b6dfa0;}
.syn.pending{background:var(--red-l);color:var(--red);border-color:#f5b8bf;}
.syn:hover{opacity:.75;}
.gc{background:white;border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:var(--r);padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s;}
.gc:hover{box-shadow:0 2px 12px rgba(28,53,94,0.1);}
.gc.urgent{border-left-color:var(--red);}
.gc.ok{border-left-color:var(--green);}
.gc-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px;}
.gc-name{font-family:'Cambria',serif;font-size:14px;color:var(--navy);font-weight:600;}
.gc-date{font-size:11px;color:var(--gray);margin-top:1px;}
.days-p{font-size:11px;padding:2px 9px;border-radius:10px;font-weight:600;white-space:nowrap;}
.dp-urgent{background:var(--red-l);color:var(--red);}
.dp-soon{background:var(--blue-l);color:var(--blue);}
.dp-ok{background:var(--green-l);color:var(--green);}
.gf{display:flex;flex-wrap:wrap;gap:5px;}
.gt{padding:2px 9px;border-radius:10px;font-size:11px;background:var(--red-l);color:var(--red);}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 56px - 44px);}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:6px;}
.msg{display:flex;gap:9px;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.msg.assistant .msg-av{background:var(--blue);color:white;}
.msg.user .msg-av{background:var(--navy);color:white;}
.msg-bub{max-width:580px;padding:9px 13px;border-radius:8px;font-size:13.5px;line-height:1.65;}
.msg.assistant .msg-bub{background:white;border:1px solid var(--border);color:#1a1a2e;border-radius:2px 8px 8px 8px;}
.msg.user .msg-bub{background:var(--navy);color:white;border-radius:8px 2px 8px 8px;}
.msg-bub strong{font-weight:600;}
.msg-bub p{margin-bottom:5px;}
.msg-bub p:last-child{margin-bottom:0;}
.qbs{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
.qb{padding:5px 13px;border-radius:16px;font-size:12px;font-family:'Open Sans',sans-serif;font-weight:500;cursor:pointer;border:1.5px solid var(--navy);background:white;color:var(--navy);}
.qb:hover{background:var(--navy);color:white;}
.sel-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--blue-l);border:1px solid var(--blue);color:var(--blue);border-radius:16px;font-size:12px;margin:2px;}
.sel-tag-x{background:none;border:none;cursor:pointer;color:var(--blue);font-size:13px;line-height:1;padding:0;}
.chat-ir{padding-top:14px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;align-items:flex-end;}
.chat-in{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:22px;font-family:'Open Sans',sans-serif;font-size:14px;color:#1a1a2e;outline:none;resize:none;height:42px;background:white;}
.chat-in:focus{border-color:var(--navy);}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--navy);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{background:var(--navy-l);}
.send-btn svg{width:17px;height:17px;fill:white;}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:12px;}
.tc{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;text-align:left;font-family:'Open Sans',sans-serif;transition:all .14s;}
.tc:hover{border-color:var(--navy);box-shadow:0 2px 8px rgba(28,53,94,0.08);}
.tc-ic{font-size:20px;margin-bottom:5px;}
.tc-t{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:1px;}
.tc-d{font-size:11px;color:var(--gray);}
.sub-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.sc2{flex:1;min-width:120px;background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:11px 13px;cursor:pointer;font-family:'Open Sans',sans-serif;transition:all .14s;}
.sc2:hover{border-color:var(--navy);background:#e8edf5;}
.sc2-t{font-size:13px;font-weight:600;color:var(--navy);}
.sc2-d{font-size:11px;color:var(--gray);margin-top:2px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}
.fg.single{grid-template-columns:1fr;}
.fg.triple{grid-template-columns:1fr 1fr 1fr;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;color:var(--gray);}
.field input,.field select,.field textarea{padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-family:'Open Sans',sans-serif;font-size:13px;background:var(--gray-ll);color:#1a1a2e;outline:none;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);background:white;}
.field textarea{resize:vertical;min-height:68px;}
.choir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:6px;margin-top:8px;}
.choir-tog{padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:12px;background:var(--gray-ll);color:#444;user-select:none;text-align:center;transition:all .12s;}
.choir-tog:hover{border-color:var(--navy);}
.choir-tog.on{background:#e8edf5;border-color:var(--navy);color:var(--navy);font-weight:600;}
.status-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
.status-tog{padding:5px 13px;border-radius:16px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--gray-ll);color:#444;transition:all .12s;}
.status-tog:hover{border-color:var(--navy);}
.status-tog.on{background:var(--navy);color:white;border-color:var(--navy);}
.mod-row{display:flex;gap:14px;margin-bottom:13px;align-items:center;}
.mod-check{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;}
.mod-check input{accent-color:var(--navy);}
.sw{position:relative;}
.sr{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid var(--border);border-radius:var(--r);z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 4px 14px rgba(0,0,0,.08);}
.sri{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
.sri:last-child{border-bottom:none;}
.sri:hover{background:var(--blue-l);}
.tn-out{font-family:'Open Sans',sans-serif;font-size:13.5px;line-height:1.9;white-space:pre-wrap;color:#1a1a2e;padding-top:14px;border-top:1px solid var(--border);}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
.spinner.dk{border-color:rgba(28,53,94,.15);border-top-color:var(--navy);}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px;color:var(--gray);font-size:13px;}
.loading .spinner{width:22px;height:22px;display:block;margin:0 auto 14px;}
.empty{text-align:center;padding:50px;color:var(--gray);}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;}
.td{width:6px;height:6px;border-radius:50%;background:var(--gray);animation:bounce 1.2s infinite;}
.td:nth-child(2){animation-delay:.2s;}
.td:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
</style>
</head>
<body>
<header class="hdr">
  <div>
    <div class="hdr-org">Indianapolis Children's Choir</div>
    <div class="hdr-sub">Event Manager</div>
  </div>
  <nav class="hdr-nav">
    <button class="nb" id="tab-dashboard" onclick="go('dashboard')">Dashboard</button>
    <button class="nb active" id="tab-intake" onclick="go('intake')">+ Add Entry</button>
    <button class="nb" id="tab-gaps" onclick="go('gaps')">Gap Report</button>
    <button class="nb" id="tab-events" onclick="go('events')">All Entries</button>
    <button class="nb" id="tab-takenote" onclick="go('takenote')">Take Note Brief</button>
  </nav>
</header>
<div class="app">
  <div class="sb">
    <div class="sb-sec">Views</div>
    <div class="sb-i" id="sb-dashboard" onclick="go('dashboard')"><span class="sb-ic">&#127968;</span> Dashboard</div>
    <div class="sb-i" id="sb-events" onclick="go('events')"><span class="sb-ic">&#128203;</span> All Entries</div>
    <div class="sb-i" id="sb-performances" onclick="gof('performances')"><span class="sb-ic">&#127925;</span> Performances</div>
    <div class="sb-i" id="sb-education" onclick="gof('education')"><span class="sb-ic">&#127891;</span> Education &amp; Outreach</div>
    <div class="sb-i" id="sb-building" onclick="gof('building')"><span class="sb-ic">&#127970;</span> Building</div>
    <div class="sb-i" id="sb-notices" onclick="gof('notices')"><span class="sb-ic">&#128226;</span> Calendar Notices</div>
    <div class="sb-div"></div>
    <div class="sb-sec">Actions</div>
    <div class="sb-i action" id="sb-intake" onclick="go('intake')"><span class="sb-ic">+</span> Add Entry</div>
    <div class="sb-i" id="sb-gaps" onclick="go('gaps')">
      <span class="sb-ic">&#9888;</span> Gap Report
      <span class="sb-badge red" id="gap-badge">-</span>
    </div>
    <div class="sb-i" id="sb-takenote" onclick="go('takenote')"><span class="sb-ic">&#128196;</span> Take Note Brief</div>
    <div class="sb-div"></div>
    <div class="sb-sec">Databases</div>
    <div class="sb-i" id="sb-db-venues" onclick="godb('venues')"><span class="sb-ic">&#128205;</span> Venues</div>
    <div class="sb-i" id="sb-db-orgs" onclick="godb('orgs')"><span class="sb-ic">&#127963;</span> Organizations</div>
    <div class="sb-i" id="sb-db-contacts" onclick="godb('contacts')"><span class="sb-ic">&#128100;</span> Collaborators</div>
  </div>
  <div class="main">
    <div class="content" id="content">
      <div class="loading"><div class="spinner dk"></div>Connecting to Notion...</div>
    </div>
  </div>
</div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
var NK = 'ntn_s40523532606oEIHti7zdPHNMHpSIssattDAezK4weQa5M';
var CDB = 'c7aa2e1b-f842-426c-a208-574d36ee826d';
var VDB = '341cb336-4acb-4540-866f-08e443ba6876';
var ODB = '1740f18a-00ec-8004-9879-f88a5d3eaec6';
var XDB = 'f5998a51-e200-4ad7-9e20-9e25ca4ca1eb';
var PERF = ['Collaborative Bookings','Season Concerts & Events','Season Concerts & Events [AACC}','Season Concerts & Events [CICC]'];
var EDU = ['Education & Outreach'];
var BLDG = ['Partner Events & Meetings','Resident Events & Meetings'];
var ORG = ['Organizational Events'];
var NTCE = ['Calendar Addition / Adjustment','Staff Notice'];
var CHOIRS = ['Foundations','Prep','BLC','Hendricks Co. BLC','Lyric','IndyVoice','Master Chorale','Touring Choirs','Jubilate','Special Group','Seniors','AAACC Prep','AACC Concert','AACC Youth Chorale','CICC Descant','CICC Concert','Neighborhood Choir Academy','Camp Participants','Alumni Choir'];
var STATS = ['In progress','Details Set','Perspective','Requested'];
var S = {ev:[],vn:[],og:[],ct:[],ch:[],chatH:[],filt:null,eRels:{},eSt:''};

// ── API ────────────────────────────────────────────────────────────────────
function nr(ep,method,payload) {
  return fetch('/.netlify/functions/notion',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({endpoint:ep,method:method||'POST',payload:payload||{},notionKey:NK})
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(r.status+': '+t.slice(0,200));});
    return r.json();
  });
}

function qdb(id,extra) {
  return nr('/databases/'+id+'/query','POST',Object.assign({page_size:100},extra||{}));
}

// ── Helpers ────────────────────────────────────────────────────────────────
function gp(page,name) {
  var ps = page.properties || {};
  var keys = Object.keys(ps);
  var k = null;
  for(var i=0;i<keys.length;i++){if(keys[i].toLowerCase()===name.toLowerCase()){k=keys[i];break;}}
  if(!k){for(var i=0;i<keys.length;i++){if(keys[i].toLowerCase().indexOf(name.toLowerCase())>=0){k=keys[i];break;}}}
  if(!k) return '';
  var p = ps[k];
  if(!p) return '';
  if(p.type==='title') return (p.title||[]).map(function(t){return t.plain_text;}).join('');
  if(p.type==='rich_text') return (p.rich_text||[]).map(function(t){return t.plain_text;}).join('');
  if(p.type==='date') return (p.date&&p.date.start)||'';
  if(p.type==='select') return (p.select&&p.select.name)||'';
  if(p.type==='multi_select') return (p.multi_select||[]).map(function(s){return s.name;}).join(', ');
  if(p.type==='relation') return p.relation||[];
  if(p.type==='checkbox') return p.checkbox||false;
  if(p.type==='status') return (p.status&&p.status.name)||'';
  return '';
}

function gt(page) {
  var ps = page.properties||{};
  var keys = Object.keys(ps);
  for(var i=0;i<keys.length;i++){
    if(ps[keys[i]].type==='title'){
      var v=(ps[keys[i]].title||[]).map(function(t){return t.plain_text;}).join('');
      if(v) return v;
    }
  }
  return 'Untitled';
}

function fd(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return d;}}
function fdl(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch(e){return d;}}
function ft(t){if(!t)return'';var p=t.split(':'),h=parseInt(p[0]),m=parseInt(p[1]);return(h%12||12)+':'+(m<10?'0':'')+m+' '+(h>=12?'PM':'AM');}
function du(d){if(!d)return null;return Math.ceil((new Date(d+'T12:00:00')-new Date())/86400000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tod(){var h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';}
function t2i(val){if(!val)return'';var m=val.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return'';var h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return(h<10?'0':'')+h+':'+(mn<10?'0':'')+mn;}

function miss(page) {
  var tags=gp(page,'Tags'),tl=typeof tags==='string'?tags.split(', '):[];
  var isN=tl.some(function(t){return NTCE.indexOf(t)>=0;});
  var isB=tl.length>0&&tl.every(function(t){return BLDG.indexOf(t)>=0;});
  if(isN) return [];
  var chk=['Call Time','Performance Time','Uniform','Venue','Contact'];
  if(!isB) chk.push('Participating Choirs');
  return chk.filter(function(f){var v=gp(page,f);if(Array.isArray(v))return v.length===0;return !v;});
}

function syncs(page) {
  var cc=gp(page,'Update on ChorusConnection'),oc=gp(page,'Update on Organizational Calendar'),jc=gp(page,"Update on Josh's Calendar"),onJ=gp(page,"On Josh's Calendar");
  var r=[{key:'cc',label:'ChorusConnection',done:cc===true},{key:'oc',label:'Organizational Calendar',done:oc===true}];
  if(onJ===true) r.push({key:'jc',label:"Josh's Calendar",done:jc===true});
  return r;
}

function pendS(page){return syncs(page).filter(function(s){return !s.done;}).length;}

function tagCol(tags){
  var tl=typeof tags==='string'?tags.split(', '):[];
  if(tl.some(function(t){return PERF.indexOf(t)>=0;})) return 'var(--navy)';
  if(tl.some(function(t){return EDU.indexOf(t)>=0;})) return 'var(--green)';
  if(tl.some(function(t){return BLDG.indexOf(t)>=0;})) return 'var(--amber)';
  if(tl.some(function(t){return NTCE.indexOf(t)>=0;})) return 'var(--gray)';
  return 'var(--blue)';
}

function spill(s){
  var m={'in progress':'sp-progress','details set':'sp-set','perspective':'sp-perspective','requested':'sp-requested','complete':'sp-complete','calendar event passed':'sp-complete'};
  return '<span class="sp '+(m[(s||'').toLowerCase()]||'sp-perspective')+'">'+esc(s||'&mdash;')+'</span>';
}

function setC(h){document.getElementById('content').innerHTML='<div class="content-bar"><div class="content-title" id="ctitle"></div><div class="content-actions" id="cactions"></div></div>'+h;}
function setT(t){var e=document.getElementById('ctitle');if(e)e.textContent=t;}
function setA(h){var e=document.getElementById('cactions');if(e)e.innerHTML=h;}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  var today = new Date().toISOString().split('T')[0];
  Promise.all([
    qdb(CDB,{sorts:[{property:'Date',direction:'ascending'}],filter:{property:'Date',date:{on_or_after:today}}}),
    qdb(VDB), qdb(ODB), qdb(XDB)
  ]).then(function(res){
    S.ev = res[0].results||[];
    S.vn = (res[1].results||[]).map(function(p){return{id:p.id,name:gt(p)};}).sort(function(a,b){return a.name.localeCompare(b.name);});
    S.og = (res[2].results||[]).map(function(p){return{id:p.id,name:gt(p)};}).sort(function(a,b){return a.name.localeCompare(b.name);});
    S.ct = (res[3].results||[]).map(function(p){return{id:p.id,name:gt(p)};}).sort(function(a,b){return a.name.localeCompare(b.name);});
    updB();
    go('dashboard');
  }).catch(function(e){
    document.getElementById('content').innerHTML='<div class="loading" style="color:var(--red);">Connection error: '+esc(e.message)+'</div>';
  });
}

function refresh() {
  var today = new Date().toISOString().split('T')[0];
  return qdb(CDB,{sorts:[{property:'Date',direction:'ascending'}],filter:{property:'Date',date:{on_or_after:today}}})
    .then(function(r){S.ev=r.results||[];updB();});
}

function updB() {
  var cnt=S.ev.filter(function(p){return miss(p).length>0;}).length;
  var el=document.getElementById('gap-badge');
  if(el){el.textContent=cnt||'0';el.className='sb-badge'+(cnt>0?' red':'');}
}

    '<div class="stat-grid"><div class="sc blue"><div class="sl">Total upcoming</div><div class="sv">'+up.length+'</div><div class="ss">'+wk.length+' this week</div></div><div class="sc '+gCard+'"><div class="sl">Missing info</div><div class="sv">'+gaps.length+'</div><div class="ss">'+(urg.length>0?urg.length+' within 14 days':gaps.length===0?'All complete':'check gap report')+'</div></div><div class="sc '+sCard+'"><div class="sl">Pending syncs</div><div class="sv">'+ps.length+'</div><div class="ss">CC / Org Cal / Josh\'s Cal</div></div><div class="sc"><div class="sl">This week</div><div class="sv">'+wk.length+'</div><div class="ss">Next 7 days</div></div></div>'+

// ── Events ────────────────────────────────────────────────────────────────
function fev(f){
  return S.ev.filter(function(p){
    if(!f) return true;
    var tags=gp(p,'Tags'),tl=typeof tags==='string'?tags.split(', '):[];
    if(f==='performances') return tl.some(function(t){return PERF.indexOf(t)>=0;});
    if(f==='education') return tl.some(function(t){return EDU.indexOf(t)>=0;});
    if(f==='building') return tl.some(function(t){return BLDG.indexOf(t)>=0;});
    if(f==='notices') return tl.some(function(t){return NTCE.indexOf(t)>=0;});
    return true;
  });
}

function showEv(f){
  var lbls={null:'All Entries',performances:'Performances',education:'Education & Outreach',building:'Building',notices:'Calendar Notices'};
  var ev=fev(f);
  if(!ev.length){setC('<div class="empty"><p>No upcoming entries.</p></div>');setT(lbls[f]||'All Entries');setA('<button class="btn primary" onclick="go(\'intake\')">+ Add Entry</button>');return;}
  var rows=ev.map(function(p){
    var m=miss(p),sy=syncs(p);
    var sh=sy.map(function(s){return '<span class="syn '+(s.done?'done':'pending')+'" onclick="togSync(\''+p.id+'\',\''+s.key+'\','+s.done+')">'+s.label+'</span>';}).join('');
    return '<tr><td style="font-weight:600;color:var(--navy);cursor:pointer;" onclick="editEv(\''+p.id+'\')">'+esc(gt(p))+'</td><td style="font-size:12px;color:var(--gray);">'+fd(gp(p,'date'))+'</td><td>'+spill(gp(p,'Status'))+'</td><td style="font-size:12px;">'+esc(gp(p,'Call Time')||'\u2014')+'</td><td style="font-size:12px;">'+esc(gp(p,'Uniform')||'\u2014')+'</td><td>'+(m.length?'<span style="color:var(--red);font-size:12px;font-weight:600;">&#9888; '+m.length+'</span>':'<span style="color:var(--green);font-size:12px;">&#10003;</span>')+'</td><td><div class="sync-row">'+sh+'</div></td></tr>';
  }).join('');
  setC('<div class="card" style="padding:0;overflow:hidden;"><table class="tbl"><thead><tr><th>Entry</th><th>Date</th><th>Status</th><th>Call Time</th><th>Uniform</th><th>Missing</th><th>Sync</th></tr></thead><tbody>'+rows+'</tbody></table></div>');
  setT(lbls[f]||'All Entries');

}

function togSync(pid,key,cur){
  var fm={cc:'Update on ChorusConnection',oc:'Update on Organizational Calendar',jc:"Update on Josh's Calendar"};
  var field=fm[key];if(!field)return;
  var props={};props[field]={checkbox:!cur};
  nr('/pages/'+pid,'PATCH',{properties:props}).then(function(){
    var idx=S.ev.findIndex(function(p){return p.id===pid;});
    if(idx>=0){var fk=Object.keys(S.ev[idx].properties).find(function(k){return k===field;});if(fk)S.ev[idx].properties[fk].checkbox=!cur;}
    showEv(S.filt);updB();
  }).catch(function(e){alert('Error: '+e.message);});
}

function togESt(btn){
  document.querySelectorAll('#e-sr .status-tog').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  S.eSt=btn.getAttribute('data-st');
}

function attachSearch(inId,resId,selId,key){
  var inp=document.getElementById(inId);
  if(!inp) return;
  inp.addEventListener('input',function(){
    var q=inp.value.trim().toLowerCase();
    var rEl=document.getElementById(resId);
    if(!q||!rEl){if(rEl)rEl.style.display='none';return;}
    var items=S[key]||[];
    var matches=items.filter(function(r){return r.name.toLowerCase().indexOf(q)>=0;}).slice(0,8);
    rEl.innerHTML='';
    matches.forEach(function(m){
      var d=document.createElement('div');
      d.className='sri';
      d.textContent=m.name;
      d.addEventListener('mousedown',function(e){
        e.preventDefault();
        S.eRels[key]={id:m.id,name:m.name,isNew:false};
        inp.value='';
        rEl.style.display='none';
        var sel=document.getElementById(selId);
        if(sel){
          sel.innerHTML='';
          var tag=document.createElement('span');
          tag.className='sel-tag';
          tag.textContent=m.name+' ';
          var x=document.createElement('button');
          x.className='sel-tag-x';
          x.textContent='\u00d7';
          x.onclick=function(){delete S.eRels[key];sel.innerHTML='';};
          tag.appendChild(x);
          sel.appendChild(tag);
        }
      });
      rEl.appendChild(d);
    });
    var nd=document.createElement('div');

function genTN(){
  var btn=document.getElementById('tn-btn');btn.innerHTML='<span class="spinner"></span> Generating...';btn.disabled=true;
  var dv=document.getElementById('tn-date').value,dl=document.getElementById('tn-dl').value.trim(),xb=document.getElementById('tn-br').value.trim();
  var sd=dv?new Date(dv+'T12:00:00'):new Date(),ed=new Date(sd.getTime()+42*24*60*60*1000);
  var eDate=fdl(dv||new Date().toISOString().split('T')[0]),dlText=dl||'EOD Monday before publish';
  var up=S.ev.filter(function(p){var d=gp(p,'date');if(!d)return false;var dt=new Date(d+'T12:00:00');return dt>=sd&&dt<=ed;});
  var notices=up.filter(function(p){var t=gp(p,'Tags');return typeof t==='string'&&t.indexOf('Staff Notice')>=0;});
  var calAdj=up.filter(function(p){var t=gp(p,'Tags');return typeof t==='string'&&t.indexOf('Calendar Addition / Adjustment')>=0;});
  var evs=up.filter(function(p){var t=gp(p,'Tags');return typeof t!=='string'||(t.indexOf('Staff Notice')<0&&t.indexOf('Calendar Addition / Adjustment')<0);});
  var eData=evs.map(function(p){return{name:gt(p),date:gp(p,'date'),formattedDate:fd(gp(p,'date')),callTime:gp(p,'Call Time'),perfTime:gp(p,'Performance Time'),dismissal:gp(p,'Approx. Dismissal'),uniform:gp(p,'Uniform'),choirs:gp(p,'Participating Choirs'),tags:gp(p,'Tags')};});
  var prompt='Generate the full "Take Note, Music Makers & Beyond" weekly ICC staff email for publish date '+eDate+'.\n\nRESPONSE DEADLINE: '+dlText+'\nSTAFF NOTICES: '+(notices.length?notices.map(function(p){return gt(p);}).join(', '):'None')+'\nCALENDAR ADJUSTMENTS: '+(calAdj.length?calAdj.map(function(p){return gt(p);}).join(', '):'None')+(xb?'\nAdditional breaks: '+xb:'')+'\n\nEVENTS:\n'+JSON.stringify(eData,null,2)+'\n\nFORMAT:\nHi Team!\n\nI hope your week is off to a wonderful start. [Include staff notices naturally.] Please review and respond with changes by '+dlText+'.\n\nThank you!\n\n**Breaks & Schedule Changes:**\n[List or "None this week."]\n\n**Upcoming Events:**\n**[CHOIR]:**\n**[Event] | [Date]**\nLocation: ...\nUniform: ...\nCall Time: ...\nPerformance: ...\n[Notes]\n\nCHOIR ORDER: AACC Prep & Concert, AACC Youth Chorale, CICC Concert & Descant, Foundations, ICC Preparatory Choirs, ICC Beginning Level Choirs, ICC Lyric Choirs, ICC IndyVoice, ICC Master Chorale, Jubilate\n\nRules: Omit empty fields. End with **Marketing, Development & Admin:** placeholder.';
  fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:'You are helping Camden Zetty at ICC prepare the weekly staff email.',messages:[{role:'user',content:prompt}]})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error) throw new Error(d.error.message||'API error');
      var result=(d.content||[]).map(function(c){return c.text||'';}).join('');
      window._tn=result;
      document.getElementById('tn-out').innerHTML='<div class="card" style="margin-top:14px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);"><div><div class="card-title" style="margin-bottom:2px;">Take Note, Music Makers &amp; Beyond</div><div style="font-size:12px;color:var(--gray);">Publish '+eDate+' &middot; '+evs.length+' events</div></div><div style="display:flex;gap:8px;"><button class="btn" onclick="navigator.clipboard.writeText(window._tn||\'\').then(function(){var b=event.target;b.textContent=\'Copied!\';setTimeout(function(){b.textContent=\'Copy text\';},2000)})">Copy text</button><button class="btn primary" onclick="genTN()">Regenerate</button></div></div><div class="tn-out">'+result.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')+'</div></div>';
      btn.textContent='Generate Take Note Brief';btn.disabled=false;
    }).catch(function(e){
      document.getElementById('tn-out').innerHTML='<div class="card" style="margin-top:14px;color:var(--red);">Claude API unavailable. Set ANTHROPIC_API_KEY in Netlify environment variables, or copy the prompt below and paste it into claude.ai.<br><br><textarea style="width:100%;height:200px;font-size:12px;border:1px solid var(--border);border-radius:var(--r);padding:8px;">'+esc(prompt)+'</textarea></div>';
      btn.textContent='Generate Take Note Brief';btn.disabled=false;
    });
}

// ── DB Browser ────────────────────────────────────────────────────────────
function showDB(k){
  var lbls={venues:'Venues',orgs:'Organizations',contacts:'Collaborators'};
  var ids={venues:VDB,orgs:ODB,contacts:XDB};
  setC('<div class="loading"><div class="spinner dk"></div>Loading '+lbls[k]+'...</div>');
  setT(lbls[k]||k);setA('');
  qdb(ids[k]).then(function(r){
    var pages=r.results||[];
    var rows=pages.slice(0,80).map(function(p){return'<tr><td style="font-weight:600;color:var(--navy);">'+esc(gt(p))+'</td></tr>';}).join('');
    setC('<div class="ph">'+lbls[k]+'</div><div class="ps">'+pages.length+' records</div><div class="card" style="padding:0;overflow:hidden;"><table class="tbl"><thead><tr><th>Name</th></tr></thead><tbody>'+rows+'</tbody></table></div>');
    setT(lbls[k]);
  }).catch(function(e){setC('<div class="empty"><p>Error: '+esc(e.message)+'</p></div>');});
}

// ── Boot ──────────────────────────────────────────────────────────────────
init();
</script>
