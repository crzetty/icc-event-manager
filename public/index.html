<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICC Event Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1c355e; --navy-l:#2a4a7f; --navy-xl:#e8edf5;
  --green:#60a511; --green-l:#e8f5d0;
  --amber:#e8b146; --amber-l:#fdf3dc;
  --blue:#0083c2; --blue-l:#e0f2fb;
  --red:#e53d51; --red-l:#fde8eb;
  --gray:#76777b; --gray-l:#f0f0f1; --gray-ll:#f8f8f8;
  --border:rgba(28,53,94,0.1); --r:6px;
  --shadow:0 2px 12px rgba(28,53,94,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Open Sans',sans-serif;background:var(--gray-ll);color:#1a1a2e;font-size:14px;min-height:100vh;}

/* Header */
.hdr{background:var(--navy);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;}
.hdr-brand .org{font-family:'Lora',serif;font-size:15px;color:white;font-weight:600;}
.hdr-brand .sub{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;}
.hdr-nav{display:flex;gap:3px;}
.hn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.65);font-family:'Open Sans',sans-serif;transition:all .15s;}
.hn:hover{background:rgba(255,255,255,.1);color:white;}
.hn.active{background:white;border-color:white;color:var(--navy);font-weight:600;}

/* Layout */
.app{display:flex;height:100vh;padding-top:56px;}

/* Sidebar */
.sb{width:218px;min-width:218px;background:white;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sb-sec{padding:13px 16px 3px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#444;border-left:3px solid transparent;margin-right:6px;border-radius:0 5px 5px 0;transition:all .12s;user-select:none;}
.sb-item:hover{background:var(--gray-ll);color:var(--navy);}
.sb-item.active{background:var(--navy-xl);color:var(--navy);border-left-color:var(--navy);font-weight:600;}
.sb-item.action-item{color:var(--navy);font-weight:600;}
.sb-item.action-item:hover{background:var(--navy);color:white;}
.sb-icon{font-size:13px;width:17px;text-align:center;flex-shrink:0;}
.sb-badge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
.sb-badge.red{background:var(--red-l);color:var(--red);}
.sb-badge.amber{background:var(--amber-l);color:#a67a1a;}
.sb-div{height:1px;background:var(--border);margin:7px 14px;}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.content{flex:1;overflow-y:auto;padding:0;}
.page-wrap{padding:22px 24px;}

/* Content bar (no topbar — title lives here) */
.cbar{background:white;border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ctitle{font-family:'Lora',serif;font-size:19px;color:var(--navy);}
.cactions{display:flex;gap:8px;}

/* Buttons */
.btn{padding:6px 15px;border-radius:var(--r);font-size:13px;font-family:'Open Sans',sans-serif;font-weight:500;cursor:pointer;border:1px solid var(--border);background:white;color:var(--navy);transition:all .15s;}
.btn:hover{background:var(--gray-ll);}
.btn.primary{background:var(--navy);color:white;border-color:var(--navy);}
.btn.primary:hover{background:var(--navy-l);}
.btn.sm{padding:3px 10px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* Cards */
.card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;}
.card-title{font-family:'Lora',serif;font-size:15px;color:var(--navy);margin-bottom:12px;}
.ph{font-family:'Lora',serif;font-size:21px;color:var(--navy);margin-bottom:3px;}
.ps{font-size:12px;color:var(--gray);margin-bottom:18px;}

/* Dashboard */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px;}
.sc{background:white;border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;border-top:3px solid var(--navy);transition:all .15s;}
.sc.clickable{cursor:pointer;}
.sc.clickable:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.sc.red{border-top-color:var(--red);}
.sc.green{border-top-color:var(--green);}
.sc.amber{border-top-color:var(--amber);}
.sc.blue{border-top-color:var(--blue);}
.sc.muted{border-top-color:var(--gray-l);}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:5px;}
.sv{font-family:'Lora',serif;font-size:28px;color:var(--navy);line-height:1;margin-bottom:2px;}
.sc.red .sv{color:var(--red);}
.sc.green .sv{color:var(--green);}
.sc.amber .sv{color:#a67a1a;}
.sc.blue .sv{color:var(--blue);}
.sc.muted .sv{color:var(--gray);}
.ss{font-size:11px;color:var(--gray);}
.next-ban{background:var(--navy);border-radius:var(--r);padding:16px 20px;color:white;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.next-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:2px;}
.next-name{font-family:'Lora',serif;font-size:18px;margin-bottom:4px;}
.next-meta{font-size:12px;color:rgba(255,255,255,.55);display:flex;gap:12px;flex-wrap:wrap;}
.cdn-n{font-family:'Lora',serif;font-size:38px;line-height:1;text-align:right;}
.cdn-l{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase;text-align:right;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.dp{background:white;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.dp-hdr{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dp-title{font-family:'Lora',serif;font-size:13px;color:var(--navy);font-weight:600;}
.dp-link{font-size:11px;color:var(--blue);cursor:pointer;border:none;background:none;font-family:'Open Sans',sans-serif;}
.dp-link:hover{text-decoration:underline;}
.dr{display:flex;align-items:center;gap:9px;padding:8px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.dr:last-child{border-bottom:none;}
.dr:hover{background:var(--gray-ll);}
.dd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dn{font-size:13px;font-weight:600;color:var(--navy);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ddt{font-size:11px;color:var(--gray);white-space:nowrap;}
.dbadge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600;white-space:nowrap;}
.qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px;}
.qa{background:white;border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;text-align:left;font-family:'Open Sans',sans-serif;transition:all .15s;}
.qa:hover{border-color:var(--navy);box-shadow:var(--shadow);}
.qa-ic{font-size:17px;margin-bottom:4px;}
.qa-t{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:1px;}
.qa-d{font-size:11px;color:var(--gray);}

/* Events table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:6px 11px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);border-bottom:2px solid var(--border);}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.tbl tbody tr:hover td{background:var(--gray-ll);}
.tbl tbody tr{cursor:pointer;}
.sp{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.sp-progress{background:var(--blue-l);color:var(--blue);}
.sp-set{background:var(--navy-xl);color:var(--navy);}
.sp-perspective{background:var(--gray-l);color:var(--gray);}
.sp-requested{background:var(--amber-l);color:#a67a1a;}
.sp-complete{background:var(--green-l);color:var(--green);}
.sync-row{display:flex;gap:3px;flex-wrap:wrap;}
.syn{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;white-space:nowrap;transition:opacity .12s;}
.syn.done{background:var(--green-l);color:var(--green);border-color:#b6dfa0;}
.syn.pending{background:var(--red-l);color:var(--red);border-color:#f5b8bf;}
.syn:hover{opacity:.7;}

/* Detail / Edit view */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}
.detail-grid.single{grid-template-columns:1fr;}
.detail-grid.triple{grid-template-columns:1fr 1fr 1fr;}
.field{display:flex;flex-direction:column;gap:3px;}
.field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:'Open Sans',sans-serif;font-size:13px;background:var(--gray-ll);color:#1a1a2e;outline:none;width:100%;transition:border .12s,background .12s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);background:white;}
.field textarea{resize:vertical;min-height:64px;}
.status-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.status-tog{padding:4px 12px;border-radius:16px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--gray-ll);color:#444;transition:all .12s;font-family:'Open Sans',sans-serif;}
.status-tog:hover{border-color:var(--navy);}
.status-tog.on{background:var(--navy);color:white;border-color:var(--navy);}
.mod-row{display:flex;gap:12px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.mod-check{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;}
.mod-check input{accent-color:var(--navy);}

/* Search dropdown */
.sw{position:relative;}
.sr{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid var(--border);border-radius:var(--r);z-index:200;max-height:176px;overflow-y:auto;box-shadow:0 4px 14px rgba(0,0,0,.08);}
.sri{padding:7px 11px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
.sri:last-child{border-bottom:none;}
.sri:hover{background:var(--blue-l);}
.sel-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--blue-l);border:1px solid var(--blue);color:var(--blue);border-radius:16px;font-size:12px;margin:2px;}
.sel-tag-x{background:none;border:none;cursor:pointer;color:var(--blue);font-size:12px;line-height:1;padding:0;}

/* Choir picker */
.choir-picker{margin-top:6px;}
.choir-group{margin-bottom:7px;}
.choir-l2{padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;background:var(--gray-ll);color:#444;transition:all .12s;display:inline-block;margin-bottom:4px;user-select:none;}
.choir-l2:hover{border-color:var(--navy);}
.choir-l2.on{background:var(--navy-xl);border-color:var(--navy);color:var(--navy);}
.choir-subs{display:flex;flex-wrap:wrap;gap:4px;margin-left:12px;}
.choir-l3{padding:4px 9px;border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:11px;background:var(--gray-ll);color:#555;transition:all .12s;user-select:none;}
.choir-l3:hover{border-color:var(--navy);}
.choir-l3.on{background:var(--navy-xl);border-color:var(--navy);color:var(--navy);font-weight:600;}

/* Gap report */
.gc{background:white;border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:var(--r);padding:13px 17px;margin-bottom:9px;cursor:pointer;transition:box-shadow .15s;}
.gc:hover{box-shadow:var(--shadow);}
.gc.urgent{border-left-color:var(--red);}
.gc.ok{border-left-color:var(--green);}
.gc-name{font-family:'Lora',serif;font-size:14px;color:var(--navy);font-weight:600;}
.gc-date{font-size:11px;color:var(--gray);margin-top:1px;}
.days-p{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;}
.dp-urgent{background:var(--red-l);color:var(--red);}
.dp-soon{background:var(--blue-l);color:var(--blue);}
.dp-ok{background:var(--green-l);color:var(--green);}
.gf{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.gt{padding:2px 8px;border-radius:10px;font-size:11px;background:var(--red-l);color:var(--red);}

/* Calendar Sync */
.sync-card{background:white;border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.sync-card-hdr{padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--gray-ll);}
.sync-event-name{font-family:'Lora',serif;font-size:14px;color:var(--navy);font-weight:600;cursor:pointer;}
.sync-event-name:hover{text-decoration:underline;}
.sync-event-date{font-size:11px;color:var(--gray);margin-top:2px;}
.sync-details{padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px;color:#444;display:flex;flex-wrap:wrap;gap:8px;}
.sync-detail-item{background:var(--gray-ll);padding:3px 8px;border-radius:4px;font-size:12px;}
.sync-toggles{padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.sync-tog-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;font-family:'Open Sans',sans-serif;background:white;}
.sync-tog-btn.done{background:var(--green-l);color:var(--green);border-color:#b6dfa0;}
.sync-tog-btn.pending{background:var(--red-l);color:var(--red);border-color:#f5b8bf;}
.sync-tog-btn:hover{opacity:.8;}

/* Type grid for Add Entry */
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;margin-top:10px;}
.tc{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;text-align:left;font-family:'Open Sans',sans-serif;transition:all .14s;}
.tc:hover{border-color:var(--navy);box-shadow:var(--shadow);}
.tc-ic{font-size:19px;margin-bottom:4px;}
.tc-t{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:1px;}
.tc-d{font-size:11px;color:var(--gray);}
.sub-grid{display:flex;gap:9px;flex-wrap:wrap;margin-top:9px;}
.sc2{flex:1;min-width:110px;background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;font-family:'Open Sans',sans-serif;transition:all .14s;}
.sc2:hover{border-color:var(--navy);background:var(--navy-xl);}
.sc2-t{font-size:13px;font-weight:600;color:var(--navy);}
.sc2-d{font-size:11px;color:var(--gray);margin-top:2px;}

/* Chat (Add Entry container) */
.intake-wrap{max-width:680px;}
.msg-list{display:flex;flex-direction:column;gap:13px;margin-bottom:18px;}
.msg{display:flex;gap:8px;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.msg.assistant .msg-av{background:var(--navy);color:white;}
.msg.user .msg-av{background:var(--blue);color:white;}
.msg-bub{max-width:560px;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.6;}
.msg.assistant .msg-bub{background:white;border:1px solid var(--border);border-radius:2px 8px 8px 8px;}
.msg.user .msg-bub{background:var(--navy);color:white;border-radius:8px 2px 8px 8px;}
.msg-bub p{margin-bottom:4px;}
.msg-bub p:last-child{margin-bottom:0;}
.qbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.qb{padding:4px 12px;border-radius:16px;font-size:12px;font-family:'Open Sans',sans-serif;font-weight:500;cursor:pointer;border:1.5px solid var(--navy);background:white;color:var(--navy);transition:all .12s;}
.qb:hover{background:var(--navy);color:white;}

/* Take Note */
.tn-form .field input,.tn-form .field textarea{background:white;border:1.5px solid var(--border);}
.tn-form .field input:focus,.tn-form .field textarea:focus{border-color:var(--navy);}

/* Detail view */
.detail-view{background:white;border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.detail-header{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.detail-title{font-family:'Lora',serif;font-size:20px;color:var(--navy);margin-bottom:4px;}
.detail-meta{display:flex;gap:10px;flex-wrap:wrap;}
.detail-meta-item{font-size:12px;color:var(--gray);}
.detail-field{margin-bottom:10px;}
.detail-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:2px;}
.detail-field-value{font-size:13px;color:#1a1a2e;}
.detail-section{margin-bottom:16px;}
.detail-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}

.choir-accordion { margin-top:6px; }
.choir-org-btn { display:flex; align-items:center; justify-content:space-between; width:100%; padding:7px 12px; background:var(--navy-xl); border:1px solid var(--border); border-radius:var(--r); cursor:pointer; font-size:12px; font-weight:600; color:var(--navy); margin-bottom:3px; font-family:'Open Sans',sans-serif; text-align:left; transition:all .12s; }
.choir-org-btn:hover { background:#dce4f0; }
.choir-org-btn.selected { background:var(--navy); color:white; border-color:var(--navy); }
.choir-org-children { padding:6px 6px 2px 6px; margin-bottom:4px; display:none; }
.choir-org-children.open { display:block; }
.choir-l2-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:4px; }
.choir-l2-unit { display:flex; align-items:center; gap:2px; }
.choir-l2 { display:inline-flex; align-items:center; padding:4px 10px; border:1px solid var(--border); border-radius:14px; cursor:pointer; font-size:12px; font-weight:600; background:var(--gray-ll); color:#444; transition:all .12s; user-select:none; white-space:nowrap; overflow:hidden; }
.choir-l2:hover { border-color:var(--navy); color:var(--navy); }
.choir-l2.on { background:var(--navy-xl); border-color:var(--navy); color:var(--navy); }
.choir-l2-expand { display:inline-flex; align-items:center; justify-content:center; padding:0 5px; border-left:1px solid var(--border); cursor:pointer; font-size:9px; color:var(--gray); transition:all .12s; user-select:none; flex-shrink:0; height:100%; margin-left:2px; }
.choir-l2-expand:hover { color:var(--navy); }
.choir-l3-wrap { display:flex; flex-wrap:wrap; gap:4px; padding:5px 6px 6px 6px; background:var(--gray-ll); border-radius:var(--r); margin-bottom:4px; border:1px solid var(--border); }
.choir-l3 { padding:3px 9px; border:1px solid var(--border); border-radius:12px; cursor:pointer; font-size:11px; background:white; color:#555; transition:all .12s; user-select:none; }
.choir-l3:hover { border-color:var(--navy); color:var(--navy); }
.choir-l3.on { background:var(--navy-xl); border-color:var(--navy); color:var(--navy); font-weight:600; }
.choir-expand-arrow { font-size:9px; transition:transform .2s; line-height:1; }
.choir-expand-arrow.open { transform:rotate(90deg); }

/* DB record detail */
.db-detail{background:white;border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;}
.db-detail-name{font-family:'Lora',serif;font-size:18px;color:var(--navy);margin-bottom:10px;}
.db-prop{display:flex;gap:8px;margin-bottom:6px;font-size:13px;}
.db-prop-key{color:var(--gray);min-width:100px;font-size:12px;}
.db-prop-val{color:#1a1a2e;}

/* Misc */
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
.spinner.dk{border-color:rgba(28,53,94,.15);border-top-color:var(--navy);}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px;color:var(--gray);font-size:13px;}
.loading .spinner{width:20px;height:20px;display:block;margin:0 auto 12px;}
.empty{text-align:center;padding:48px;color:var(--gray);}
.empty-ic{font-size:28px;margin-bottom:8px;}

function nFetch(ep, method, data) {
  return fetch('/.netlify/functions/server', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({action:'notion', notionKey:NK, payload:{endpoint:ep, method:method||'POST', data:(method==='GET'?null:(data||{}))}})
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(r.status + ': ' + t.slice(0,200)); });
    return r.json();
  });
}

function qdb(id, extra) {
  return nFetch('/databases/'+id+'/query', 'POST', Object.assign({page_size:100}, extra||{}));
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function gp(page, name) {
  var ps = page.properties || {};
  var keys = Object.keys(ps);
  var k = null;
  for (var i=0; i<keys.length; i++) { if (keys[i].toLowerCase()===name.toLowerCase()) {k=keys[i];break;} }
  if (!k) for (var i=0; i<keys.length; i++) { if (keys[i].toLowerCase().indexOf(name.toLowerCase())>=0) {k=keys[i];break;} }
  if (!k) return '';
  var p = ps[k];
  if (!p) return '';
  if (p.type==='title') return (p.title||[]).map(function(t){return t.plain_text;}).join('');
  if (p.type==='rich_text') return (p.rich_text||[]).map(function(t){return t.plain_text;}).join('');
  if (p.type==='date') return (p.date&&p.date.start)||'';
  if (p.type==='select') return (p.select&&p.select.name)||'';
  if (p.type==='multi_select') return (p.multi_select||[]).map(function(s){return s.name;}).join(', ');
  if (p.type==='relation') return p.relation||[];
  if (p.type==='checkbox') return p.checkbox||false;
  if (p.type==='status') return (p.status&&p.status.name)||'';
  return '';
}

function gtitle(page) {
  var ps = page.properties || {};
  var keys = Object.keys(ps);
  for (var i=0; i<keys.length; i++) {
    if (ps[keys[i]].type==='title') {
      var v = (ps[keys[i]].title||[]).map(function(t){return t.plain_text;}).join('');
      if (v) return v;
    }
  }
  return 'Untitled';
}

function fmtDate(d) { if (!d) return ''; try { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch(e) { return d; } }
function fmtDateLong(d) { if (!d) return ''; try { var dt=new Date(d+'T12:00:00'); var ms=['January','February','March','April','May','June','July','August','September','October','November','December']; var day=dt.getDate(); var sf=day===1||day===21||day===31?'st':day===2||day===22?'nd':day===3||day===23?'rd':'th'; return ms[dt.getMonth()]+' '+day+sf; } catch(e) { return d; } }
function fmtTime(t) { if (!t) return ''; var p=t.split(':'),h=parseInt(p[0]),m=parseInt(p[1]); return (h%12||12)+':'+(m<10?'0':'')+m+' '+(h>=12?'PM':'AM'); }
function t2i(val) { if (!val) return ''; var m=val.match(/(\d+):(\d+)\s*(AM|PM)/i); if (!m) return ''; var h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3].toUpperCase(); if(ap==='PM'&&h!==12)h+=12; if(ap==='AM'&&h===12)h=0; return (h<10?'0':'')+h+':'+(mn<10?'0':'')+mn; }
function daysUntil(d) { if (!d) return null; return Math.ceil((new Date(d+'T12:00:00')-new Date())/86400000); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function tod() { var h=new Date().getHours(); return h<12?'morning':h<17?'afternoon':'evening'; }

function missingFields(page) {
  var tags=gp(page,'Tags'), tl=typeof tags==='string'?tags.split(', '):[];
  var isN=tl.some(function(t){return TAG_NOTICE.indexOf(t)>=0;});
  var isBldgOnly=tl.length>0&&tl.every(function(t){return TAG_BLDG.indexOf(t)>=0;});
  if (isN) return [];
  if (isBldgOnly) return ['Venue','Organization','Contact'].filter(function(f){var v=gp(page,f);return Array.isArray(v)?v.length===0:!v;});
  return ['Call Time','Performance Time','Approx. Dismissal','Uniform','Venue','Organization','Contact','Participating Choirs'].filter(function(f){var v=gp(page,f);return Array.isArray(v)?v.length===0:!v;});
}

function getSyncs(page) {
  var cc=gp(page,'Update on ChorusConnection'), oc=gp(page,'Update on Organizational Calendar'), jc=gp(page,"Update on Josh's Calendar"), onJ=gp(page,"On Josh's Calendar");
  var r=[{key:'cc',label:'ChorusConnection',done:cc===true},{key:'oc',label:'Organizational Calendar',done:oc===true}];
  if (onJ===true) r.push({key:'jc',label:"Josh's Calendar",done:jc===true});
  return r;
}

function pendingSyncs(page) { return getSyncs(page).filter(function(s){return !s.done;}).length; }

function tagColor(tags) {
  var tl=typeof tags==='string'?tags.split(', '):[];
  if (tl.some(function(t){return TAG_PERF.indexOf(t)>=0;})) return 'var(--navy)';
  if (tl.some(function(t){return TAG_EDU.indexOf(t)>=0;})) return 'var(--green)';
  if (tl.some(function(t){return TAG_BLDG.indexOf(t)>=0;})) return 'var(--amber)';
  if (tl.some(function(t){return TAG_NOTICE.indexOf(t)>=0;})) return 'var(--gray)';
  return 'var(--blue)';
}

function init() {
  var today = new Date().toISOString().split('T')[0];
  Promise.all([
    qdb(CDB, {sorts:[{property:'Date',direction:'ascending'}], filter:{property:'Date',date:{on_or_after:today}}}),
    qdb(VDB), qdb(ODB), qdb(XDB), qdb(RUDB, {page_size:100})
  ]).then(function(res) {
    S.ev = res[0].results||[];
    S.vn = mapRel(res[1].results||[]);
    S.og = mapRel(res[2].results||[]);
    S.ct = mapRel(res[3].results||[]);
    S.ru = (res[4].results||[]).map(function(p) {
      var sub=gp(p,'Sub-item'), par=gp(p,'Parent item');
      return {
        id:p.id, name:gtitle(p),
        parentId: Array.isArray(par)&&par.length ? par[0].id : null,
        subIds: Array.isArray(sub) ? sub.map(function(s){return s.id;}) : []
      };
    });
    buildRuTree();
    updBadges();
    go('dashboard');
  }).catch(function(e) {
    render('<div class="loading" style="color:var(--red);">Connection error: '+esc(e.message)+'<br><br><button class="btn" onclick="init()">Retry</button></div>');
  });
}

function mapRel(results) {
  return results.map(function(p){return{id:p.id,name:gtitle(p)};}).sort(function(a,b){return a.name.localeCompare(b.name);});
}

function refresh() {
  var today = new Date().toISOString().split('T')[0];
  return qdb(CDB, {sorts:[{property:'Date',direction:'ascending'}], filter:{property:'Date',date:{on_or_after:today}}})
    .then(function(r){S.ev=r.results||[];updBadges();});
}

function normId(id) {
  if (!id) return '';
  var s = id.replace(/-/g,'');
  if (s.length === 32) return s.slice(0,8)+'-'+s.slice(8,12)+'-'+s.slice(12,16)+'-'+s.slice(16,20)+'-'+s.slice(20);
  return id;
}

}

function setActive(id) {
  document.querySelectorAll('.hn,.sb-item').forEach(function(b){b.classList.remove('active');});
  ['tab-','sb-'].forEach(function(p){var el=document.getElementById(p+id);if(el)el.classList.add('active');});
}

function go(tab) {
  S.currentFilter=null; S.currentTab=tab;
  setActive(tab);
  if (tab==='dashboard') showDash();
  else if (tab==='events') showEvents(null);

}

function goDb(key) {

function showDash() {
  var up=S.ev, gaps=up.filter(function(p){return missingFields(p).length>0;}),
      comp=up.filter(function(p){return missingFields(p).length===0;}),
      urgGaps=gaps.filter(function(p){var d=daysUntil(gp(p,'date'));return d!==null&&d<=14;}),
      ps=up.filter(function(p){return pendingSyncs(p)>0;}),
      wk=up.filter(function(p){var d=daysUntil(gp(p,'date'));return d!==null&&d<=7;}),
      next=up[0], nd=next?daysUntil(gp(next,'date')):null;

  var gCard=gaps.length>0?'red':(comp.length===up.length&&up.length>0?'green':'muted');
  var sCard=ps.length>0?'amber':'muted';

  var upRows = up.slice(0,6).map(function(p) {
    var m=missingFields(p), col=tagColor(gp(p,'Tags')), ps2=pendingSyncs(p);
    return '<div class="dr" onclick="showDetail(\''+p.id+'\')"><div class="dd" style="background:'+col+'"></div><div class="dn">'+esc(gtitle(p))+'</div><div class="ddt">'+fmtDate(gp(p,'date'))+'</div>'+(m.length?'<span class="dbadge" style="background:var(--red-l);color:var(--red)">&#9888; '+m.length+'</span>':'')+(ps2?'<span class="dbadge" style="background:var(--amber-l);color:#a67a1a">&#8635; '+ps2+'</span>':m.length===0?'<span class="dbadge" style="background:var(--green-l);color:var(--green)">&#10003;</span>':'')+'</div>';
  }).join('');

  var gRows = gaps.slice(0,4).map(function(p) {
    var d=daysUntil(gp(p,'date')), m=missingFields(p);
    return '<div class="dr" onclick="showEdit(\''+p.id+'\')"><div class="dd" style="background:'+(d<=7?'var(--red)':'var(--blue)')+'"></div><div style="flex:1;min-width:0"><div class="dn">'+esc(gtitle(p))+'</div><div style="font-size:11px;color:var(--gray);margin-top:1px">'+m.join(' · ')+'</div></div><div class="ddt">'+(d===0?'Today':d===1?'Tomorrow':d+' days')+'</div></div>';
  }).join('');

  var html = '';
  html += '<div class="ph">Good '+tod()+', Camden.</div>';
  html += '<div class="ps">'+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+'</div>';

  if (next) {
    html += '<div class="next-ban"><div><div class="next-label">Next event</div><div class="next-name">'+esc(gtitle(next))+'</div><div class="next-meta"><span>'+fmtDate(gp(next,'date'))+'</span>'+(gp(next,'Call Time')?'<span>Call '+esc(gp(next,'Call Time'))+'</span>':'')+(gp(next,'Uniform')?'<span>'+esc(gp(next,'Uniform'))+'</span>':'')+'</div></div><div><div class="cdn-n">'+(nd===0?'Today':nd===1?'1':nd)+'</div><div class="cdn-l">'+(nd===0?'':nd===1?'day away':'days away')+'</div></div></div>';
  }

  html += '<div class="stat-grid">';
  html += '<div class="sc blue"><div class="sl">Total upcoming</div><div class="sv">'+up.length+'</div><div class="ss">'+wk.length+' this week</div></div>';
  html += '<div class="sc '+gCard+' clickable" onclick="go(\'gaps\')"><div class="sl">Missing Info</div><div class="sv">'+gaps.length+'</div><div class="ss">'+(urgGaps.length>0?urgGaps.length+' within 14 days':gaps.length===0?'All complete':'Check gap report')+'</div></div>';
  html += '<div class="sc '+sCard+' clickable" onclick="go(\'sync\')"><div class="sl">Pending syncs</div><div class="sv">'+ps.length+'</div><div class="ss">Click to review &amp; update</div></div>';
  html += '<div class="sc"><div class="sl">This week</div><div class="sv">'+wk.length+'</div><div class="ss">Next 7 days</div></div>';
  html += '</div>';

  html += '<div class="qa-grid">';
  html += '<button class="qa" onclick="go(\'intake\')"><div class="qa-ic">+</div><div class="qa-t">Add Entry</div><div class="qa-d">Event, notice, or adjustment</div></button>';
  html += '<button class="qa" onclick="go(\'gaps\')"><div class="qa-ic">&#9888;&#65039;</div><div class="qa-t">Gap Report</div><div class="qa-d">'+gaps.length+' entr'+(gaps.length===1?'y':'ies')+' need attention</div></button>';
  html += '<button class="qa" onclick="go(\'takenote\')"><div class="qa-ic">&#128196;</div><div class="qa-t">Take Note Brief</div><div class="qa-d">Generate staff email</div></button>';
  html += '</div>';

  html += '<div class="dash-grid">';
  html += '<div class="dp"><div class="dp-hdr"><div class="dp-title">Upcoming</div><button class="dp-link" onclick="go(\'events\')">View all &rarr;</button></div>'+(upRows||'<div style="padding:16px;text-align:center;color:var(--gray);font-size:13px">No upcoming entries</div>')+'</div>';

function filterEvents(f) {
  return S.ev.filter(function(p) {
    if (!f) return true;
    var tl=typeof gp(p,'Tags')==='string'?gp(p,'Tags').split(', '):[];
    if (f==='perf') return tl.some(function(t){return TAG_PERF.indexOf(t)>=0;});
    if (f==='edu') return tl.some(function(t){return TAG_EDU.indexOf(t)>=0;});
    if (f==='bldg') return tl.some(function(t){return TAG_BLDG.indexOf(t)>=0;});
    if (f==='notices') return tl.some(function(t){return TAG_NOTICE.indexOf(t)>=0;});
    return true;
  });
}

function showEvents(f) {
  var lbls={null:'All Entries',perf:'Performances',edu:'Education & Outreach',bldg:'Building',notices:'Calendar Notices'};
  var ev = filterEvents(f);
  var rows = ev.map(function(p) {
    var m=missingFields(p), sy=getSyncs(p);
    var sh=sy.map(function(s){return '<span class="syn '+(s.done?'done':'pending')+'" onclick="togSync(event,\''+p.id+'\',\''+s.key+'\','+s.done+')">'+s.label+'</span>';}).join('');
  var vRel=gp(p,'Venue'), vidX=Array.isArray(vRel)&&vRel.length?vRel[0].id:null;
  var vObjX=vidX?S.vn.find(function(v){return v.id===vidX;}):null;
  var venueHtml=vObjX?'<div style="font-size:11px;color:var(--gray);font-weight:400;margin-top:1px">'+esc(vObjX.name)+'</div>':'';
  return '<tr onclick="showDetail(\x27'+p.id+'\x27)" style="cursor:pointer"><td style="font-weight:600;color:var(--navy)">'+esc(gtitle(p))+venueHtml+'</td><td style="font-size:12px;color:var(--gray);white-space:nowrap">'+fmtDate(gp(p,'date'))+'</td><td>'+spill(gp(p,'Status'))+'</td><td style="font-size:12px;white-space:nowrap">'+esc(gp(p,'Call Time')||'\u2014')+'</td><td style="font-size:12px;white-space:nowrap">'+esc(gp(p,'Performance Time')||'\u2014')+'</td><td style="font-size:12px;white-space:nowrap">'+esc(gp(p,'Approx. Dismissal')||'\u2014')+'</td><td style="font-size:12px">'+esc(gp(p,'Uniform')||'\u2014')+'</td><td><div class="sync-row">'+sh+'</div></td></tr>';
  }).join('');

  var body = ev.length ? '<div class="card" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr><th style="width:28%">Entry</th><th style="width:9%">Date</th><th style="width:9%">Status</th><th style="width:8%">Call Time</th><th style="width:9%">Performance</th><th style="width:9%">Dismissal</th><th style="width:9%">Uniform</th><th>Sync</th></tr></thead><tbody>'+rows+'</tbody></table></div>' : '<div class="empty"><div class="empty-ic">&#128203;</div><p>No upcoming entries in this category.</p></div>';
  page(lbls[f]||'All Entries', '<button class="btn" onclick="refresh().then(function(){showEvents('+JSON.stringify(f)+')})">&#8635; Refresh</button><button class="btn primary" onclick="go(\'intake\')">+ Add Entry</button>', body);
}

function togSync(evt, pid, key, cur) {
  evt.stopPropagation();
  var fm={cc:'Update on ChorusConnection',oc:'Update on Organizational Calendar',jc:"Update on Josh's Calendar"};
  var field=fm[key]; if(!field) return;
  var props={}; props[field]={checkbox:!cur};
  nFetch('/pages/'+pid,'PATCH',{properties:props}).then(function(){
    var idx=S.ev.findIndex(function(p){return p.id===pid;});
    if(idx>=0){var fk=Object.keys(S.ev[idx].properties).find(function(k){return k===field;});if(fk)S.ev[idx].properties[fk].checkbox=!cur;}
    updBadges();
    if (S.currentTab==='sync') showSync();
    else showEvents(S.currentFilter);
  }).catch(function(e){alert('Error: '+e.message);});
}

function togSyncDirect(pid, key, cur) {

function goBack(tab) {
  if (!tab) { go('events'); return; }
  if (tab==='dashboard') go('dashboard');
  else if (tab==='gaps') go('gaps');
  else if (tab==='sync') go('sync');
  else if (tab==='events') go('events');
  else if (tab && tab.indexOf('events')>=0) showEvents(S.currentFilter);
  else go('events');
}

// GAP REPORT
// ═══════════════════════════════════════════════════════════════
function showGaps() {
  var wg = S.ev.map(function(p){return{p:p,m:missingFields(p),d:daysUntil(gp(p,'date'))};})
    .filter(function(x){return x.m.length>0;}).sort(function(a,b){return a.d-b.d;});
  var comp = S.ev.filter(function(p){return missingFields(p).length===0;});

  var cards = wg.map(function(x) {
    var dc=x.d<=7?'dp-urgent':x.d<=21?'dp-soon':'dp-ok', dl=x.d<=0?'Today':x.d===1?'Tomorrow':x.d+' days';
    return '<div class="gc '+(x.d<=7?'urgent':'')+'" onclick="showEdit(\''+x.p.id+'\')"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px"><div><div class="gc-name">'+esc(gtitle(x.p))+'</div><div class="gc-date">'+fmtDate(gp(x.p,'date'))+'</div></div><span class="days-p '+dc+'">'+dl+'</span></div><div class="gf">'+x.m.map(function(f){return'<span class="gt">'+esc(f)+'</span>';}).join('')+'</div></div>';
  }).join('');

  var cs = comp.length ? '<div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--border)"><div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px">&#10003; Complete ('+comp.length+')</div>'+comp.map(function(p){return'<div class="gc ok" style="padding:9px 15px"><div style="display:flex;justify-content:space-between"><div><div class="gc-name" style="font-size:13px">'+esc(gtitle(p))+'</div><div class="gc-date">'+fmtDate(gp(p,'date'))+'</div></div><span style="color:var(--green)">&#10003;</span></div></div>';}).join('')+'</div>' : '';

  var body = wg.length ? '<div class="ph">Gap Report</div><div class="ps">'+wg.length+' entries need attention &mdash; click any to edit</div>'+cards+cs : '<div class="empty"><div class="empty-ic">&#9989;</div><p style="color:var(--green)">All upcoming entries are complete.</p></div>';
  page('Gap Report', '<button class="btn" onclick="refresh().then(showGaps)">&#8635; Refresh</button>', body);
}

  document.querySelectorAll('#edit-sr .status-tog').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on'); editStatus = btn.getAttribute('data-s');

function saveEdit() {
  if (!editPageId) { alert('No event selected.'); return; }
  var btn = document.querySelector('[onclick="saveEdit()"]');
  if (btn) { btn.innerHTML='<span class="spinner"></span> Saving...'; btn.disabled=true; }

  var call=(document.getElementById('ec')||{}).value||'';
  var perf=(document.getElementById('ep')||{}).value||'';
  var dis=(document.getElementById('ed')||{}).value||'';
  var uni=((document.getElementById('eu')||{}).value||'').trim();
  var notes=((document.getElementById('en')||{}).value||'').trim();
  var props = {};
  props['Update on ChorusConnection']={checkbox:false};
  props['Update on Organizational Calendar']={checkbox:false};
  props["Update on Josh's Calendar"]={checkbox:false};
  if (call) props['Call Time']={rich_text:[{text:{content:fmtTime(call)}}]};
  if (perf) props['Performance Time']={rich_text:[{text:{content:fmtTime(perf)}}]};
  if (dis) props['Approx. Dismissal']={rich_text:[{text:{content:fmtTime(dis)}}]};
  if (uni) props['Uniform']={rich_text:[{text:{content:uni}}]};
  if (editStatus) props['Status']={status:{name:editStatus}};
  if (S.intake.rels.vn&&S.intake.rels.vn.id) props['Venue']={relation:[{id:S.intake.rels.vn.id}]};
  if (S.intake.rels.og&&S.intake.rels.og.id) props['Organization']={relation:[{id:S.intake.rels.og.id}]};
  if (S.intake.rels.ct&&S.intake.rels.ct.id) props['Contact']={relation:[{id:S.intake.rels.ct.id}]};

  var sel = getSelectedRU();
  if (sel.ruIds.length) props['Receiving Updates']={relation:sel.ruIds.map(function(id){return{id:id};})};
  if (sel.choirNames.length) props['Participating Choirs']={multi_select:sel.choirNames.map(function(c){return{name:c};})};

  var chain = nFetch('/pages/'+editPageId,'PATCH',{properties:props});

function showSync() {
  var pending = S.ev.filter(function(p){return pendingSyncs(p)>0;});
  var body = '';
  if (!pending.length) {
    body = '<div class="empty"><div class="empty-ic">&#10003;</div><p style="color:var(--green)">All calendars are up to date.</p></div>';
  } else {
    body += '<div class="ph">Calendar Sync</div><div class="ps">'+pending.length+' entr'+(pending.length===1?'y':'ies')+' need calendar updates &mdash; review details and check off each platform when done</div>';
    pending.forEach(function(p) {
      var sy = getSyncs(p).filter(function(s){return !s.done;});
      var call=gp(p,'Call Time'), perf=gp(p,'Performance Time'), uni=gp(p,'Uniform'), dis=gp(p,'Approx. Dismissal');
      var ruRel=gp(p,'Receiving Updates'), ruIds=Array.isArray(ruRel)?ruRel.map(function(r){return r.id;}):[];
      var choirs=ruIds.map(function(id){var r=S.ru.find(function(x){return x.id===id;});return r?r.name:'';}).filter(Boolean);

      body += '<div class="sync-card">';
      body += '<div class="sync-card-hdr"><div><div class="sync-event-name" onclick="showDetail(\''+p.id+'\')">'+esc(gtitle(p))+'</div><div class="sync-event-date">'+fmtDate(gp(p,'date'))+'</div></div>';
      body += '<button class="btn sm" onclick="showEdit(\''+p.id+'\')">&#9998; Edit</button></div>';

      // Details inline — always shown
      body += '<div class="sync-details">';
      if (call) body += '<span class="sync-detail-item"><strong>Call:</strong> '+esc(call)+'</span>';
      if (perf) body += '<span class="sync-detail-item"><strong>Performance:</strong> '+esc(perf)+'</span>';
      if (dis) body += '<span class="sync-detail-item"><strong>Dismissal:</strong> '+esc(dis)+'</span>';
      if (uni) body += '<span class="sync-detail-item"><strong>Uniform:</strong> '+esc(uni)+'</span>';
      var vRel2=gp(p,'Venue'), vid2=Array.isArray(vRel2)&&vRel2.length?vRel2[0].id:null;
      var vObj2=vid2?S.vn.find(function(v){return v.id===vid2;}):null;
      if (vObj2) body += '<span class="sync-detail-item"><strong>Venue:</strong> '+esc(vObj2.name)+'</span>';
      if (choirs.length) body += '<span class="sync-detail-item"><strong>Choirs:</strong> '+esc(choirs.join(', '))+'</span>';
      if (!call&&!perf&&!dis&&!uni&&!choirs.length&&!vObj2) body += '<span class="sync-detail-item" style="color:var(--gray)">Review &amp; Update</span>';
      body += '</div>';
      body += '<div class="sync-toggles">';
      getSyncs(p).forEach(function(s) {
        body += '<button class="sync-tog-btn '+(s.done?'done':'pending')+'" onclick="togSyncCard(\''+p.id+'\',\''+s.key+'\','+s.done+')">'+
          (s.done?'&#10003; ':'&#9675; ')+s.label+'</button>';
      });
      body += '</div></div>';
    });
  }
  page('Calendar Sync', '<button class="btn" onclick="refresh().then(showSync)">&#8635; Refresh</button>', body);
}

function togSyncCard(pid, key, cur) {
  var fm={cc:'Update on ChorusConnection',oc:'Update on Organizational Calendar',jc:"Update on Josh's Calendar"};
  var field=fm[key]; if(!field) return;
  var props={}; props[field]={checkbox:!cur};
  nFetch('/pages/'+pid,'PATCH',{properties:props}).then(function(){

}

function buildChoirPicker(orgKey, selectedRuIds) {
  var sel = selectedRuIds || [];
  return '<div class="choir-picker-wrap">'+buildChoirPickerHtml(sel)+'</div>';
}

function buildChoirPickerHtml(sel) {
  var uid = 'cp' + Date.now();
  var h = '<div class="choir-accordion" id="'+uid+'">';
  CHOIR_TREE.forEach(function(orgGroup, oi) {
    var orgId = uid+'_org'+oi;
    var anyOrgSel = orgGroup.choirs.some(function(l2){
      return sel.indexOf(l2.id)>=0 || l2.children.some(function(c){return sel.indexOf(c.id)>=0;});
    });
    // Org header button
    h += '<button class="choir-org-btn'+(anyOrgSel?' selected':'')+'" onclick="togChoirOrg(\x27'+orgId+'\x27)" type="button">';
    h += '<span>'+esc(orgGroup.fullName)+'</span>';
    h += '<span class="choir-expand-arrow'+(anyOrgSel?' open':'')+'" id="'+orgId+'_arr">&#9658;</span>';
    h += '</button>';
    // Org children container
    h += '<div class="choir-org-children'+(anyOrgSel?' open':'')+'" id="'+orgId+'">';
    // Row of L2 choir chips
    h += '<div class="choir-l2-chips">';
    orgGroup.choirs.forEach(function(l2, li) {
      var l2Id = orgId+'_l2'+li;
      var l2sel = sel.indexOf(l2.id) >= 0;
      var anyChildSel = l2.children.length > 0 && l2.children.some(function(c){return sel.indexOf(c.id)>=0;});
      var hasChildren = l2.children.length > 0;
      h += '<div class="choir-l2-unit">';
      if (hasChildren) {
        // Single chip: click anywhere selects AND expands
        h += '<div class="choir-l2'+(l2sel&&!anyChildSel?' on':'')+'" data-ruid="'+l2.id+'" data-runame="'+esc(l2.name)+'" data-l2expand="'+l2Id+'" data-l2arr="'+l2Id+'_arr" onclick="togChoirL2AndExpand(this)">';
        h += '<span>'+esc(l2.name)+'</span>';
        h += '<span class="choir-l2-arrow'+(anyChildSel?' open':'')+'" id="'+l2Id+'_arr" style="margin-left:5px;font-size:9px;transition:transform .2s;display:inline-block;'+(anyChildSel?'transform:rotate(90deg)':'')+'"">&#9658;</span>';
        h += '</div>';
      } else {
        h += '<div class="choir-l2'+(l2sel?' on':'')+'" data-ruid="'+l2.id+'" data-runame="'+esc(l2.name)+'" onclick="togChoirL2(this)">'+esc(l2.name)+'</div>';
      }
      h += '</div>';
    });
    h += '</div>'; // close choir-l2-chips
    // L3 location panels (one per L2 that has children)
    orgGroup.choirs.forEach(function(l2, li) {
      var l2Id = orgId+'_l2'+li;
      var anyChildSel = l2.children.length > 0 && l2.children.some(function(c){return sel.indexOf(c.id)>=0;});
      if (l2.children.length > 0) {
        h += '<div class="choir-l3-wrap" id="'+l2Id+'" style="'+(anyChildSel?'':'display:none;')+'">';
        h += '<div style="font-size:10px;font-weight:600;color:var(--gray);margin-bottom:4px;width:100%">'+esc(l2.name)+':</div>';
        l2.children.forEach(function(l3) {
          var l3sel = sel.indexOf(l3.id) >= 0;
          var label = l3.name.replace(l2.name+' | ','').replace(l2.name+' ','');
          h += '<div class="choir-l3'+(l3sel?' on':'')+'" data-ruid="'+l3.id+'" data-runame="'+esc(l3.name)+'" data-parentid="'+l2.id+'" onclick="togChoirL3(this)">'+esc(label)+'</div>';
        });
        h += '</div>'; // close choir-l3-wrap
      }
    });
    h += '</div>'; // close choir-org-children  ← THIS WAS MISSING
  });
  h += '</div>'; // close choir-accordion
  return h;
}


function togChoirOrg(id) {
  var el = document.getElementById(id);
  var arr = document.getElementById(id+'_arr');
  var btn = el ? el.previousElementSibling : null;
  if (!el) return;
  var isOpen = el.classList.contains('open');
  el.classList.toggle('open');
  if (arr) arr.classList.toggle('open');
  if (btn) btn.classList.toggle('selected', !isOpen);
}

function togChoirL2Expand(id, arrId) {
  var el = document.getElementById(id);
  var arr = document.getElementById(arrId);
  if (!el) return;
  var isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'flex';
  if (arr) arr.classList.toggle('open', !isOpen);
}

function togChoirL2(el) {
  el.classList.toggle('on');
  var rid = el.getAttribute('data-ruid');
  // Clear any L3 children when deselecting parent
  if (!el.classList.contains('on')) {
    document.querySelectorAll('[data-parentid="'+rid+'"]').forEach(function(s){s.classList.remove('on');});
  }
}

function togChoirL2AndExpand(el) {
  // Toggle selection
  el.classList.toggle('on');
  var rid = el.getAttribute('data-ruid');
  // Clear any L3 children when deselecting parent
  if (!el.classList.contains('on')) {
    document.querySelectorAll('[data-parentid="'+rid+'"]').forEach(function(s){s.classList.remove('on');});
  }
  // Toggle the location panel
  var l2Id = el.getAttribute('data-l2expand');
  var arrId = el.getAttribute('data-l2arr');
  if (l2Id) {
    var panel = document.getElementById(l2Id);
    var arr = document.getElementById(arrId);
    if (panel) {
      var isOpen = panel.style.display !== 'none';
      panel.style.display = isOpen ? 'none' : 'flex';
      if (arr) arr.style.transform = isOpen ? '' : 'rotate(90deg)';
    }
  }
}

function togChoirL3(el) {
  el.classList.toggle('on');
  var parentId = el.getAttribute('data-parentid');
  // If any L3 selected, deselect the L2 parent
  var parent = document.querySelector('.choir-l2[data-ruid="'+parentId+'"]');
  if (parent) parent.classList.remove('on');
}

function getSelectedRU() {
  var ruIds = [], choirNames = [];
  // L2 selected with no L3 children selected
  document.querySelectorAll('#content .choir-l2.on').forEach(function(el) {
    var rid = el.getAttribute('data-ruid');
    var name = el.getAttribute('data-runame');
    var anyChild = document.querySelectorAll('[data-parentid="'+rid+'"].on').length > 0;
    if (!anyChild) {
      ruIds.push(rid);
      var c = ruToChoir(name); if(c&&choirNames.indexOf(c)<0) choirNames.push(c);
    }
  });
  // L3 selected
  document.querySelectorAll('#content .choir-l3.on').forEach(function(el) {
    var rid = el.getAttribute('data-ruid');
    var name = el.getAttribute('data-runame');
    ruIds.push(rid);
    var c = ruToChoir(name); if(c&&choirNames.indexOf(c)<0) choirNames.push(c);
  });
  return {ruIds:ruIds, choirNames:choirNames};
}

function attachSearch(inId, resId, selId, key) {
  var inp = document.getElementById(inId); if (!inp) return;
  inp.addEventListener('input', function() {
    var q = inp.value.trim().toLowerCase();
    var rEl = document.getElementById(resId);
    if (!q || !rEl) { if(rEl) rEl.style.display='none'; return; }
    var items = S[key]||[];
    var matches = items.filter(function(r){return r.name.toLowerCase().indexOf(q)>=0;}).slice(0,8);
    rEl.innerHTML = '';
    matches.forEach(function(m) {
      var d = document.createElement('div'); d.className='sri'; d.textContent=m.name;
      d.addEventListener('mousedown', function(e) {
        e.preventDefault();
        S.intake.rels[key] = {id:m.id,name:m.name,isNew:false};
        inp.value=''; rEl.style.display='none';
        var sel=document.getElementById(selId); if(!sel) return;

        var tag=document.createElement('span'); tag.className='sel-tag'; tag.textContent=m.name+' ';
        var x=document.createElement('button'); x.className='sel-tag-x'; x.textContent='\u00d7';
        x.onclick=function(){delete S.intake.rels[key];sel.innerHTML='';};
        tag.appendChild(x); sel.appendChild(tag);
      });
      rEl.appendChild(d);
    });
    var nd=document.createElement('div'); nd.className='sri'; nd.style.color='#a67a1a'; nd.style.fontStyle='italic';
    nd.textContent='+ Create new: "'+q+'"';
    nd.addEventListener('mousedown',function(e){
      e.preventDefault();
      rEl.style.display='none';
      inp.value='';
      showCreateNew(key, q);
    });
    rEl.appendChild(nd); rEl.style.display='block';
  });
}

function subEntry(){
  var nameEl=document.getElementById('fn'); var name=(nameEl?nameEl.value:'').trim();
  if(!name){alert('Entry name is required.');return;}
  var btn=document.querySelector('[onclick="subEntry()"]');

  var date=(document.getElementById('fd')||{}).value||'';

  else if(iType==='edu')tags.push('Education & Outreach');
  else if(iType==='bldg'){if(iSub==='org-bldg')tags.push('Organizational Events');else tags.push(iSub==='resident'?'Resident Events & Meetings':'Partner Events & Meetings');}
  else if(iType==='cal')tags.push('Calendar Addition / Adjustment');
  else if(iType==='notice')tags.push('Staff Notice');

// TAKE NOTE BRIEF
// ═══════════════════════════════════════════════════════════════
function showTN() {
  var today = new Date().toISOString().split('T')[0];
  var html = '<div style="max-width:680px" class="tn-form">';
  html += '<div class="ph" style="margin-bottom:3px">Take Note Brief</div>';
  html += '<div class="ps" style="margin-bottom:18px">Queries Notion, creates the Weekly Updates page, and downloads the formatted Word doc</div>';
  html += '<div class="card">';
  html += '<div class="detail-grid"><div class="field"><label>Publish date (Thursday)</label><input type="date" id="tn-date" value="'+today+'" /><div style="font-size:11px;color:var(--gray);margin-top:3px">Breaks: this Thursday only &bull; Events: 6 weeks from this date</div></div>';
  html += '<div class="field"><label>Response deadline</label><input type="text" id="tn-dl" placeholder="e.g. EOD Monday, April 28th" /></div></div>';
  html += '<div class="detail-grid single"><div class="field"><label>Additional breaks &amp; schedule changes (optional)</label><textarea id="tn-br" placeholder="Manual additions beyond what is in Notion..." style="min-height:60px"></textarea></div></div>';
  html += '<button class="btn primary" style="width:100%;padding:10px" id="tn-btn" onclick="genTN()">Generate &amp; Download Word Doc</button>';
  html += '</div><div id="tn-status"></div></div>';
  page('Take Note Brief', '', html);
}

function genTN() {
  var btn=document.getElementById('tn-btn');
  btn.innerHTML='<span class="spinner"></span> Building...'; btn.disabled=true;
  var statusEl=document.getElementById('tn-status');
  var dv=document.getElementById('tn-date').value;
  var dl=document.getElementById('tn-dl').value.trim();
  var xb=document.getElementById('tn-br').value.trim();
  if(!dv){alert('Please select a publish date.');btn.textContent='Generate & Download Word Doc';btn.disabled=false;return;}

  var pubDate=new Date(dv+'T12:00:00');
  var thurEnd=new Date(pubDate.getTime()+7*24*60*60*1000);
  var sixEnd=new Date(pubDate.getTime()+42*24*60*60*1000);

  statusEl.innerHTML='<div style="margin-top:12px;font-size:13px;color:var(--gray)">&#9679; Querying Notion events...</div>';

  Promise.all([
    qdb(CDB,{filter:{and:[{property:'Date',date:{on_or_after:dv}},{property:'Date',date:{before:thurEnd.toISOString().split('T')[0]}},{property:'Tags',multi_select:{contains:'Calendar Addition / Adjustment'}}]},sorts:[{property:'Date',direction:'ascending'}]}),
    qdb(CDB,{filter:{and:[{property:'Date',date:{on_or_after:dv}},{property:'Date',date:{on_or_before:sixEnd.toISOString().split('T')[0]}}]},sorts:[{property:'Date',direction:'ascending'}],page_size:100})
  ]).then(function(res) {
    var breakEvents=res[0].results||[], allEvents=res[1].results||[];
    statusEl.innerHTML='<div style="margin-top:12px;font-size:13px;color:var(--gray)">&#9679; Fetching venue addresses...</div>';

    var venueIds={};
    allEvents.forEach(function(p){var v=gp(p,'Venue');if(Array.isArray(v)&&v.length)venueIds[v[0].id]=true;});
    var venueIdList=Object.keys(venueIds);

    return Promise.all(venueIdList.map(function(vid){
      return nFetch('/pages/'+vid,'GET',null).then(function(vp){return{id:vid,name:gtitle(vp),address:gp(vp,'Address')||''};}).catch(function(){return{id:vid,name:'',address:''};});
    })).then(function(venues) {
      var venueMap={};venues.forEach(function(v){venueMap[v.id]=v;});
      statusEl.innerHTML='<div style="margin-top:12px;font-size:13px;color:var(--gray)">&#9679; Fetching event notes...</div>';

      var eventsForBriefIds = allEvents.filter(function(p){var t=gp(p,'Tags');return typeof t!=='string'||(t.indexOf('Staff Notice')<0&&t.indexOf('Calendar Addition / Adjustment')<0);}).map(function(p){return p.id;});

      return Promise.all(eventsForBriefIds.map(function(pid){
        return nFetch('/blocks/'+pid+'/children','GET',null).then(function(r){return{id:pid,blocks:(r.results||[])};}).catch(function(){return{id:pid,blocks:[]};});
      })).then(function(bodyResults){
        var bodyMap={};bodyResults.forEach(function(b){bodyMap[b.id]=b.blocks;});
        return {venueMap:venueMap,bodyMap:bodyMap,breakEvents:breakEvents,allEvents:allEvents};
      });
    });
  }).then(function(data) {
    statusEl.innerHTML='<div style="margin-top:12px;font-size:13px;color:var(--gray)">&#9679; Assembling brief...</div>';

    // Build breaks section
    var breaksSection=[];
    data.breakEvents.forEach(function(p){
      var ruRel=gp(p,'Receiving Updates'), ruIds=Array.isArray(ruRel)?ruRel.map(function(r){return r.id;}):[];
      if(!ruIds.length){breaksSection.push({choirName:'',entryName:gtitle(p)});return;}
      ruIds.forEach(function(rid){var r=S.ru.find(function(x){return x.id===rid;});if(r)breaksSection.push({choirName:r.name,entryName:gtitle(p)});});
    });
    if(xb)breaksSection.push({choirName:'',entryName:xb});

    var eventsNoNotice=data.allEvents.filter(function(p){var t=gp(p,'Tags');return typeof t!=='string'||(t.indexOf('Staff Notice')<0&&t.indexOf('Calendar Addition / Adjustment')<0);});

    // Build choir sections
    var choirSections=BRIEF_SECTIONS.map(function(sec){
      var secEvs=eventsNoNotice.filter(function(p){
        var ruRel=gp(p,'Receiving Updates'); if(!Array.isArray(ruRel)||!ruRel.length) return false;
        var evRuIds=ruRel.map(function(r){return r.id;});
        return sec.ruIds.some(function(id){return evRuIds.indexOf(id)>=0;});
      });
      var events=secEvs.map(function(p){
        var vrel=gp(p,'Venue'), vid=Array.isArray(vrel)&&vrel.length?vrel[0].id:null;
        var venue=vid?data.venueMap[vid]:null;
        return {name:gtitle(p),formattedDate:fmtDateLong(gp(p,'date')),venueName:venue?venue.name:'',venueAddress:venue?venue.address:'',uniform:gp(p,'Uniform')||'',callTime:gp(p,'Call Time')||'',perfTime:gp(p,'Performance Time')||'',dismissal:gp(p,'Approx. Dismissal')||'',bodyBlocks:data.bodyMap[p.id]||[]};
      });
      return {label:sec.label,color:sec.color,events:events};
    });

    // Create Notion Weekly Updates page
    statusEl.innerHTML='<div style="margin-top:12px;font-size:13px;color:var(--gray)">&#9679; Creating Notion Weekly Updates page...</div>';
    nFetch('/pages','POST',{parent:{database_id:WUDB},properties:{'Push Date':{title:[{text:{content:'Take Note | '+fmtDateLong(dv)}}]}}}).catch(function(){});

    // Generate Word doc
    statusEl.innerHTML='<div style="margin-top:12px;font-size:13px;color:var(--gray)">&#9679; Generating Word doc...</div>';
    return fetch('/.netlify/functions/server',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'generate_doc',notionKey:NK,payload:{publishDate:dv,deadline:dl||'EOD Monday',breaksSection:breaksSection,choirSections:choirSections}})
    });
  }).then(function(resp){
    if(!resp.ok) return resp.text().then(function(t){throw new Error(t);});
    return resp.blob();
  }).then(function(blob){
    var d=new Date(document.getElementById('tn-date').value+'T12:00:00');
    var mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var fname='TNMB_-_'+mn[d.getMonth()]+'_'+d.getDate()+'_'+d.getFullYear()+'.docx';
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=fname; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    btn.textContent='Generate & Download Word Doc'; btn.disabled=false;
    statusEl.innerHTML='<div style="margin-top:12px;padding:12px;background:var(--green-l);border-radius:var(--r);color:var(--green);font-size:13px;font-weight:600">&#10003; '+fname+' downloaded &mdash; Notion page created.</div>';
  }).catch(function(e){
    btn.textContent='Generate & Download Word Doc'; btn.disabled=false;
    statusEl.innerHTML='<div style="margin-top:12px;padding:12px;background:var(--red-l);border-radius:var(--r);color:var(--red);font-size:13px">Error: '+esc(e.message)+'</div>';
  });
}

var DB_IDS = {venues:VDB, orgs:ODB, contacts:XDB};
var DB_LABELS = {venues:'Venues', orgs:'Organizations', contacts:'Collaborators'};

function showDbBrowser(key) {
  page(DB_LABELS[key]||key, '', '<div class="loading"><div class="spinner dk"></div>Loading...</div>');
  qdb(DB_IDS[key]).then(function(r) {
    var pages = r.results||[];
    page(DB_LABELS[key], '',
      '<div class="ph">'+esc(DB_LABELS[key])+'</div><div class="ps">'+pages.length+' records &mdash; click to view details</div>'+
      '<div class="card" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr><th>Name</th></tr></thead><tbody id="db-tbody"></tbody></table></div>');
    var tbody = document.getElementById('db-tbody');
    if (!tbody) return;
    pages.forEach(function(p) {
      var row = document.createElement('tr');
      row.style.cursor = 'pointer';
      row.addEventListener('click', (function(k,id){return function(){showDbRecord(k,id);};})(key,p.id));
      var td = document.createElement('td');
      td.style.fontWeight = '600'; td.style.color = 'var(--navy)'; td.textContent = gtitle(p);
      row.appendChild(td); tbody.appendChild(row);
    });
  }).catch(function(e){page(DB_LABELS[key],'','<div class="empty"><p>Error: '+esc(e.message)+'</p></div>');});
}

function showDbRecord(key, pid) {
  page(DB_LABELS[key]||key,'<button class="btn" onclick="goDb(\x27'+key+'\x27)">&#8592; Back</button>','<div class="loading"><div class="spinner dk"></div>Loading...</div>');
  nFetch('/pages/'+pid,'GET',null).then(function(p) {
    var ps=p.properties||{};
    // Collect relation IDs
    var relIds=[];
    Object.keys(ps).forEach(function(k){if(ps[k].type==='relation'){(ps[k].relation||[]).forEach(function(r){if(r.id&&relIds.indexOf(r.id)<0)relIds.push(r.id);});}});
    // Resolve from cache first
    var relNames={};
    relIds.forEach(function(id){
      var found=S.vn.find(function(x){return normId(x.id)===normId(id);})||
               S.og.find(function(x){return normId(x.id)===normId(id);})||
               S.ct.find(function(x){return normId(x.id)===normId(id);})||
               S.ev.find(function(p2){return normId(p2.id)===normId(id);});
      if(found)relNames[id]=found.name||gtitle(found);
    });
    // Fetch unresolved (linked events not in S.ev cache)
    var unresolved=relIds.filter(function(id){return !relNames[id];});
    return Promise.all(unresolved.slice(0,30).map(function(id){
      return nFetch('/pages/'+id,'GET',null).then(function(rp){relNames[id]=gtitle(rp);}).catch(function(){relNames[id]='';});
    })).then(function(){
      var html='<div class="db-detail"><div class="db-detail-name">'+esc(gtitle(p))+'</div>';
      var order=['Job Title','Industry','Venue Type','Address','County','Website','Company / Organization','Collaborator Since','Pronouns','Email','Phone','LinkedIn','Capacity','Collaborations & Events'];
      var shown={};
      // Show in order first
      order.forEach(function(k){
        if(!ps[k])return; shown[k]=true;
        var v=gp(p,k); if(!v||Array.isArray(v)&&!v.length) return;
        var display;
        if(Array.isArray(v)&&v.length){
          // Check if these IDs are contacts - make them clickable
          var contactIds = S.ct.map(function(c){return c.id;});
          var relHtml = v.map(function(r){
            var nm = relNames[r.id]||'';
            if(!nm) return '';
            var isContact = contactIds.indexOf(r.id)>=0 || S.ct.some(function(c){return normId(c.id)===normId(r.id);});
            if(isContact) return '<span style="color:var(--blue);cursor:pointer;text-decoration:underline" onclick="showDbRecord(\x27contacts\x27,\x27'+r.id+'\x27)">'+esc(nm)+'</span>';
            return esc(nm);
          }).filter(Boolean).join('<br>');
          display = relHtml || (v.length+' linked');
          html+='<div class="db-prop"><span class="db-prop-key">'+esc(k)+'</span><div class="db-prop-val">'+display+'</div></div>';
        } else {
          display=typeof v==='boolean'?(v?'Yes':'No'):String(v);
          html+='<div class="db-prop"><span class="db-prop-key">'+esc(k)+'</span><div class="db-prop-val" style="white-space:pre-line">'+esc(display)+'</div></div>';
        }
      });
      // Show any remaining non-system fields
      Object.keys(ps).forEach(function(k){
        if(shown[k]||ps[k].type==='title') return;
        var v=gp(p,k); if(!v||Array.isArray(v)&&!v.length) return;
        var display;
        if(Array.isArray(v)&&v.length){
          // Check if these IDs are contacts - make them clickable
          var contactIds = S.ct.map(function(c){return c.id;});
          var relHtml = v.map(function(r){
            var nm = relNames[r.id]||'';
            if(!nm) return '';
            var isContact = contactIds.indexOf(r.id)>=0 || S.ct.some(function(c){return normId(c.id)===normId(r.id);});
            if(isContact) return '<span style="color:var(--blue);cursor:pointer;text-decoration:underline" onclick="showDbRecord(\x27contacts\x27,\x27'+r.id+'\x27)">'+esc(nm)+'</span>';
            return esc(nm);
          }).filter(Boolean).join('<br>');
          display = relHtml || (v.length+' linked');
          html+='<div class="db-prop"><span class="db-prop-key">'+esc(k)+'</span><div class="db-prop-val">'+display+'</div></div>';
        } else {
          display=typeof v==='boolean'?(v?'Yes':'No'):String(v);
          html+='<div class="db-prop"><span class="db-prop-key">'+esc(k)+'</span><div class="db-prop-val" style="white-space:pre-line">'+esc(display)+'</div></div>';
        }
      });
      html+='</div>';
      page(gtitle(p),'<button class="btn" onclick="goDb(\x27'+key+'\x27)">&#8592; Back</button>',html);
    });
  }).catch(function(e){page(DB_LABELS[key]||key,'','<div class="empty"><p>Error: '+esc(e.message)+'</p></div>');});
}

var cnOrgRel = null;

function attachSearchModal(inId, resId, selId, key) {
  var inp=document.getElementById(inId); if(!inp) return;
  inp.addEventListener('input', function(){
    var q=inp.value.trim().toLowerCase();
    var rEl=document.getElementById(resId);
    if(!q||!rEl){if(rEl)rEl.style.display='none';return;}
    var items=S[key]||[];
    var matches=items.filter(function(r){return r.name.toLowerCase().indexOf(q)>=0;}).slice(0,8);
    rEl.innerHTML='';
    matches.forEach(function(m){
      var d=document.createElement('div'); d.className='sri'; d.textContent=m.name;
      d.addEventListener('mousedown',function(e){
        e.preventDefault();
        cnOrgRel={id:m.id,name:m.name};
        inp.value=''; rEl.style.display='none';
        var sel=document.getElementById(selId); if(!sel) return;
        sel.innerHTML='';
        var tag=document.createElement('span'); tag.className='sel-tag'; tag.textContent=m.name+' ';

        x.onclick=function(){cnOrgRel=null;sel.innerHTML='';};
        tag.appendChild(x); sel.appendChild(tag);
      });
      rEl.appendChild(d);
    });
    rEl.style.display='block';
  });
}

    props['Name']={title:[{text:{content:name}}]};
    var vtype=(document.getElementById('cn-type')||{}).value||'';
    var county=(document.getElementById('cn-county')||{}).value||'';
    var addr=(document.getElementById('cn-address')||{}).value||'';
    var cap=(document.getElementById('cn-capacity')||{}).value||'';
    if(vtype)props['Venue Type']={select:{name:vtype}};
    if(county)props['County']={select:{name:county}};
    if(addr)props['Address']={rich_text:[{text:{content:addr}}]};
    if(cap)props['Capacity']={number:parseFloat(cap)};
  } else if(key==='og'){
    props['Name']={title:[{text:{content:name}}]};
    var ind=typeof getMselVals==='function'?getMselVals('cn-industry'):[];
    var web=(document.getElementById('cn-website')||{}).value||'';
    if(ind.length)props['Industry']={multi_select:ind.map(function(i){return{name:i};})};
    if(web)props['Website']={url:web};
  } else if(key==='ct'){
    props['Name']={title:[{text:{content:name}}]};
    var jtitle=(document.getElementById('cn-title')||{}).value||'';
    var email=(document.getElementById('cn-email')||{}).value||'';
    var phone=(document.getElementById('cn-phone')||{}).value||'';
    var pronouns=(document.getElementById('cn-pronouns')||{}).value||'';
    var linkedin=(document.getElementById('cn-linkedin')||{}).value||'';
    if(jtitle)props['Job Title']={rich_text:[{text:{content:jtitle}}]};
    if(email)props['Email']={email:email};
    if(phone)props['Phone']={phone_number:phone};
    if(pronouns)props['Pronouns']={rich_text:[{text:{content:pronouns}}]};
    if(linkedin)props['LinkedIn']={url:linkedin};
    if(cnOrgRel&&cnOrgRel.id)props['Company / Organization']={relation:[{id:cnOrgRel.id}]};
  }
  nFetch('/pages','POST',{parent:{database_id:dbIds[key]},properties:props})
    .then(function(np){
      var newRec={id:np.id,name:name};
      S[key].push(newRec); S[key].sort(function(a,b){return a.name.localeCompare(b.name);});
      closeCreateNew();
      var selMap={vn:'fvsel',og:'fosel',ct:'fxsel'};
      var inMap={vn:'fvs',og:'fos',ct:'fxs'};
      var selId=selMap[key],inId=inMap[key];
      if(!document.getElementById(selId)){selId=key==='vn'?'evsel':key==='og'?'eosel':'excel';inId=key==='vn'?'evs':key==='og'?'eos':'exs';}
      S.intake.rels[key]={id:np.id,name:name,isNew:false};
      var inp=document.getElementById(inId);if(inp)inp.value='';
      var selEl=document.getElementById(selId);
      if(selEl){
        selEl.innerHTML='';
        var tag=document.createElement('span');tag.className='sel-tag';tag.textContent=name+' ';
        var x=document.createElement('button');x.className='sel-tag-x';x.textContent='×';
        x.onclick=function(){delete S.intake.rels[key];selEl.innerHTML='';};
        tag.appendChild(x);selEl.appendChild(tag);
      }
    })
    .catch(function(e){if(btn){btn.textContent='Create in Notion';btn.disabled=false;}alert('Error: '+e.message);});
}



init();
</script>
